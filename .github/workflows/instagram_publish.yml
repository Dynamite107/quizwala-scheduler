name: Instagram Publisher

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

concurrency:
  group: instagram-publisher
  cancel-in-progress: false

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests pytz python-dotenv
        
    - name: Execute Publisher State Machine
      env:
        APP_ID: ${{ secrets.APP_ID }}
        APP_SECRET: ${{ secrets.APP_SECRET }}
        PAGE_ID: ${{ secrets.PAGE_ID }}
        IG_USER_ID: ${{ secrets.IG_USER_ID }}
        USER_ACCESS_TOKEN: ${{ secrets.USER_ACCESS_TOKEN }}
        PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
      run: |
        python publisher.py
        
    - name: Commit and Push Queue State
      run: |
        git config --global user.name 'QuizWala Bot'
        git config --global user.email 'bot@quizwala.com'
        git add queue.json logs/publisher.log || true
        git commit -m "chore(queue): update state machine [skip ci]" || echo "No update."
        git push
