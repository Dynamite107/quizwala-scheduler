name: QuizWala IG Auto Publisher
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
concurrency:
  group: instagram-publisher
  cancel-in-progress: false

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz python-dotenv
      - env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          USER_ACCESS_TOKEN: ${{ secrets.USER_ACCESS_TOKEN }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          TIMEZONE: 'Asia/Kolkata'
        run: python publisher.py
      - run: |
          git config --global user.name 'QuizWala Bot'
          git config --global user.email 'actions@github.com'
          git add queue.json logs/publisher.log || true
          if git diff --staged --quiet; then echo "No update."; else git commit -m "chore: queue update [skip ci]"; git push; fi
